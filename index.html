<html> 

<head>
    <script src="https://unpkg.com/paper@0.11.5/dist/paper-full.min.js"></script>
    <script
        type="text/paperscript"
        canvas="splatterPaint"
        src="script.js"
    ></script>

    <!-- linked the html file to css -->
    <link rel="stylesheet" href="style.css">

    <script>
        //making a working "new work" button
        function newWorkButton() {
            const x = document.getElementById("startMenu");
            x.style.display = "none";
        }

        //making the settings button appear/disapear
        function settingsButton() {
            const x = document.getElementById("Settings");
            x.style.display = "block";
        }


    </script>

</head>

<body> 
    <canvas id="splatterPaint"></canvas>

    <!-- creating an entry page/menu? - START MENU! -->
    <div class="center">
        <div id="startMenu" class="startmenu">
            <!-- attempting to make my own start button! -->
            <button onclick="newWorkButton()" type="button" class="button button1">
                new work
            </button>

            <!-- previous works button -->
            <button type="button" class="button button2">
                previous works


            </button>

            <!-- settings button -->
            <button onclick="settingsButton()" type="button" class="button button3">
                settings


            </button>
            
            <!-- working on a settings div -->
            <div class="settings" id="Settings">
                <p>
                    new work
                </p>
            </div>
            
            <!-- welcome to splat paint header-->
            <h1 class="welcomesplat">
                Welcome to Splatter Paint!
            </h1>


            
        </div>
    

            
    </div>


</body>

</html>
